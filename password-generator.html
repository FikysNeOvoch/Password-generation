<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PASSGEN</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #2a2a2a;
    --accent: #e8ff3c;
    --accent2: #ff3c6e;
    --text: #f0f0f0;
    --muted: #555;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 80% 20%, rgba(232,255,60,0.05) 0%, transparent 60%),
      radial-gradient(ellipse 40% 60% at 20% 80%, rgba(255,60,110,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 560px;
    position: relative;
    z-index: 1;
  }

  .title-block {
    margin-bottom: 40px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(72px, 16vw, 120px);
    line-height: 0.85;
    letter-spacing: 2px;
    color: var(--text);
  }

  .title span {
    color: var(--accent);
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 8px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 32px;
  }

  /* Password display */
  .password-display {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 20px 24px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    min-height: 72px;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }

  .password-display:hover {
    border-color: var(--accent);
  }

  .password-text {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    word-break: break-all;
    color: var(--accent);
    flex: 1;
    letter-spacing: 1px;
    transition: opacity 0.15s;
  }

  .copy-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .copy-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .copy-btn.copied {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(232,255,60,0.08);
  }

  /* Strength bar */
  .strength-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }

  .strength-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    width: 70px;
    flex-shrink: 0;
  }

  .strength-bars {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .strength-bar {
    height: 4px;
    flex: 1;
    background: var(--border);
    transition: background 0.3s;
  }

  .strength-value {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    width: 60px;
    text-align: right;
    flex-shrink: 0;
  }

  /* Length slider */
  .control-row {
    margin-bottom: 24px;
  }

  .control-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .control-label {
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .control-value {
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--accent);
  }

  input[type="range"] {
    -webkit-appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px;
    height: 16px;
    background: var(--accent);
    cursor: pointer;
    border: none;
  }

  /* Checkboxes */
  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }

  .option {
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    padding: 12px;
    border: 1px solid var(--border);
    transition: border-color 0.2s;
  }

  .option:hover {
    border-color: #444;
  }

  .option input[type="checkbox"] {
    display: none;
  }

  .checkbox-custom {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  .option input:checked ~ .option-content .checkbox-custom,
  .checkbox-custom.checked {
    background: var(--accent);
    border-color: var(--accent);
  }

  .option.active {
    border-color: var(--accent);
  }

  .option.active .checkbox-custom {
    background: var(--accent);
    border-color: var(--accent);
  }

  .checkbox-tick {
    font-size: 10px;
    color: var(--bg);
    display: none;
  }

  .option.active .checkbox-tick {
    display: block;
  }

  .option-label {
    font-size: 11px;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    transition: color 0.2s;
  }

  .option.active .option-label {
    color: var(--text);
  }

  /* Generate button */
  .generate-btn {
    width: 100%;
    background: var(--accent);
    color: var(--bg);
    border: none;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 4px;
    padding: 18px;
    cursor: pointer;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .generate-btn:hover {
    background: #fff;
    transform: translateY(-1px);
  }

  .generate-btn:active {
    transform: translateY(0);
  }

  /* Entropy info */
  .info-row {
    display: flex;
    justify-content: space-between;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .info-item {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .info-item span {
    color: var(--text);
    margin-left: 4px;
  }

  /* Flash animation */
  @keyframes flash {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }

  .flash {
    animation: flash 0.2s ease-out;
  }

  /* Noise overlay */
  .noise {
    position: fixed;
    inset: 0;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }
</style>
</head>
<body>
<div class="noise"></div>
<div class="container">
  <div class="title-block">
    <div class="title">PASS<span>GEN</span></div>
    <div class="subtitle">генератор паролей</div>
  </div>

  <div class="card">
    <!-- Password output -->
    <div class="password-display" id="pwDisplay" onclick="copyPassword()">
      <div class="password-text" id="pwText">нажмите «генерировать»</div>
      <button class="copy-btn" id="copyBtn">КОПИРОВАТЬ</button>
    </div>

    <!-- Strength -->
    <div class="strength-row">
      <div class="strength-label">Сила</div>
      <div class="strength-bars" id="strengthBars">
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
        <div class="strength-bar"></div>
      </div>
      <div class="strength-value" id="strengthValue">—</div>
    </div>

    <!-- Length -->
    <div class="control-row">
      <div class="control-header">
        <div class="control-label">Длина</div>
        <div class="control-value" id="lengthValue">16</div>
      </div>
      <input type="range" id="lengthSlider" min="4" max="64" value="16" oninput="updateLength(this.value)">
    </div>

    <!-- Options -->
    <div class="options-grid">
      <div class="option active" id="opt-upper" onclick="toggleOption('upper')">
        <div class="checkbox-custom"><span class="checkbox-tick">✓</span></div>
        <div class="option-label">Заглавные</div>
      </div>
      <div class="option active" id="opt-lower" onclick="toggleOption('lower')">
        <div class="checkbox-custom"><span class="checkbox-tick">✓</span></div>
        <div class="option-label">Строчные</div>
      </div>
      <div class="option active" id="opt-numbers" onclick="toggleOption('numbers')">
        <div class="checkbox-custom"><span class="checkbox-tick">✓</span></div>
        <div class="option-label">Цифры</div>
      </div>
      <div class="option" id="opt-symbols" onclick="toggleOption('symbols')">
        <div class="checkbox-custom"><span class="checkbox-tick">✓</span></div>
        <div class="option-label">Символы</div>
      </div>
    </div>

    <!-- Generate -->
    <button class="generate-btn" onclick="generate()">Генерировать</button>

    <!-- Info -->
    <div class="info-row">
      <div class="info-item">Энтропия<span id="entropy">—</span></div>
      <div class="info-item">Символов<span id="charsetSize">—</span></div>
      <div class="info-item">Длина<span id="pwLen">—</span></div>
    </div>
  </div>
</div>

<script>
  const options = { upper: true, lower: true, numbers: true, symbols: false };

  const charsets = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  function toggleOption(key) {
    const active = Object.values(options).filter(Boolean).length;
    if (options[key] && active === 1) return; // keep at least one
    options[key] = !options[key];
    document.getElementById('opt-' + key).classList.toggle('active', options[key]);
  }

  function updateLength(val) {
    document.getElementById('lengthValue').textContent = val;
  }

  function generate() {
    const len = parseInt(document.getElementById('lengthSlider').value);
    let charset = '';
    let guaranteed = [];

    for (const [key, val] of Object.entries(options)) {
      if (val) {
        charset += charsets[key];
        guaranteed.push(charsets[key][Math.floor(Math.random() * charsets[key].length)]);
      }
    }

    if (!charset) return;

    const array = new Uint32Array(len);
    crypto.getRandomValues(array);

    let password = guaranteed.map(c => c);
    for (let i = guaranteed.length; i < len; i++) {
      password.push(charset[array[i] % charset.length]);
    }

    // shuffle
    for (let i = password.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [password[i], password[j]] = [password[j], password[i]];
    }

    const pw = password.join('');
    const pwEl = document.getElementById('pwText');
    pwEl.textContent = pw;
    pwEl.classList.remove('flash');
    void pwEl.offsetWidth;
    pwEl.classList.add('flash');

    document.getElementById('copyBtn').textContent = 'КОПИРОВАТЬ';
    document.getElementById('copyBtn').classList.remove('copied');

    updateStrength(pw, charset.length, len);
    updateInfo(charset.length, len);
  }

  function updateStrength(pw, charsetSize, len) {
    const entropy = len * Math.log2(charsetSize);
    const bars = document.getElementById('strengthBars').children;
    const label = document.getElementById('strengthValue');

    let level, text, color;
    if (entropy < 40) { level = 1; text = 'СЛАБЫЙ'; color = '#ff3c6e'; }
    else if (entropy < 60) { level = 2; text = 'СРЕДНИЙ'; color = '#ff9f3c'; }
    else if (entropy < 80) { level = 3; text = 'СИЛЬНЫЙ'; color = '#3cffb4'; }
    else { level = 4; text = 'ОТЛИЧНЫЙ'; color = '#e8ff3c'; }

    for (let i = 0; i < 4; i++) {
      bars[i].style.background = i < level ? color : 'var(--border)';
    }
    label.textContent = text;
    label.style.color = color;
  }

  function updateInfo(charsetSize, len) {
    const entropy = (len * Math.log2(charsetSize)).toFixed(1);
    document.getElementById('entropy').textContent = ' ' + entropy + ' bit';
    document.getElementById('charsetSize').textContent = ' ' + charsetSize;
    document.getElementById('pwLen').textContent = ' ' + len;
  }

  async function copyPassword() {
    const pw = document.getElementById('pwText').textContent;
    if (pw === 'нажмите «генерировать»') return;
    try {
      await navigator.clipboard.writeText(pw);
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'СКОПИРОВАНО';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'КОПИРОВАТЬ';
        btn.classList.remove('copied');
      }, 2000);
    } catch(e) {}
  }

  // Generate on load
  generate();
</script>
</body>
</html>
